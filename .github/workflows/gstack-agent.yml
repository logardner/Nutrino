name: GStack Agent

on:
  workflow_dispatch:
    inputs:
      task:
        description: "What should the agent do?"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  gstack-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install gstack
        run: |
          git clone --single-branch --depth 1 https://github.com/garrytan/gstack.git ~/.claude/skills/gstack
          cd ~/.claude/skills/gstack
          GSTACK_SKIP_PLAYWRIGHT=1 ./setup --host claude --no-prefix

      - name: Run Claude Code with gstack
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Use gstack for this task.

            Task:
            ${{ github.event.inputs.task }}

            Requirements:
            - Run /autoplan before editing.
            - Make the smallest focused code change possible.
            - Add or update tests only when appropriate.
            - Do not create a branch.
            - Do not commit.
            - Do not push.
            - Do not open a PR.
            - Only modify files in the checked-out workspace.

            Before finishing, summarize:
            - Files changed
            - Tests run, if any
            - Assumptions
          claude_args: |
            --max-turns 20
            --allowedTools Edit,Read,Write,Bash

      - name: Check for changes
        id: changes
        run: |
          echo "Git status after Claude:"
          git status --short

          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch, commit, push, and open PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail

          BRANCH_NAME="agent/gstack-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git switch -c "$BRANCH_NAME"

          git add .

          if git diff --cached --quiet; then
            echo "No staged changes after git add. No PR will be created."
            exit 0
          fi

          git commit -m "Apply gstack agent task"

          git push \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${BRANCH_NAME}"

          cat > pr_body.md <<EOF
          ## Task

          ${{ github.event.inputs.task }}

          ## Notes

          This PR was created by the manual GStack Agent workflow.

          ## Verification

          See the workflow run logs for Claude's summary and any tests run.
          EOF

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --draft \
            --title "GStack agent task" \
            --body-file pr_body.md

      - name: No changes made
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "Claude completed, but no file changes were detected. No PR was created."
